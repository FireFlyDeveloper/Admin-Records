# pg_hba.conf for Admin-Records internal DB
# Trust auth inside the Docker network — no password mismatch possible.
# This file is loaded via -c hba_file=...; replaces the alpine default.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local Unix socket (for initdb and local superuser ops)
local   all             postgres                                trust
local   all             all                                     trust

# IPv4 / IPv6 local connections — trust on the Docker network
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
host    replication     all             0.0.0.0/0               trust
host    replication     all             ::/0                    trust
