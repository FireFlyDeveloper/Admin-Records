# docker-compose.prod.yml — production stack for HVLanyn
# Only the services needed to serve https://adminrecords.xyz/
# No monitoring stack (avoids pulling prometheus/grafana/loki/cadvisor)
# Created 2026-06-16 to work around Windows credential vault corruption
services:
  postgres:
    image: postgres:15-alpine
    container_name: admin-records-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: admin_records
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend-app/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin_records"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - admin-network

  redis:
    image: redis:7-alpine
    container_name: admin-records-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - admin-network

  backend:
    image: admin-records-backend:latest
    container_name: admin-records-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/admin_records
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - WS_PORT=3001
    volumes:
      - ./Backend-app/uploads:/app/uploads
      - ./Backend-app/logs:/app/logs
    ports:
      - "3001:3000"
    networks:
      - admin-network

  frontend:
    image: admin-records-frontend:latest
    container_name: admin-records-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://100.74.79.68:3001
    ports:
      - "80:80"
    networks:
      - admin-network

volumes:
  postgres_data:
  redis_data:

networks:
  admin-network:
    driver: bridge
